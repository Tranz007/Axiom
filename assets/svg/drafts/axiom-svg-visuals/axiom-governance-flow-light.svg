<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" fill="none" role="img" aria-labelledby="title desc">
<title id="title">Axiom governance flow</title>
<desc id="desc">A workflow diagram showing human intent becoming an Axiom contract, guiding an AI coding agent through checks, artifacts, and audit evidence.</desc>

  <style>
    .bg { fill: transparent; }
    .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 54px; font-weight: 760; letter-spacing: -1.2px; }
    .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 24px; font-weight: 450; line-height: 1.4; }
    .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 25px; font-weight: 700; }
    .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 500; }
    .tiny { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; font-weight: 500; }
    .mono { font-family: 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size: 17px; font-weight: 600; }
    .card { rx: 28; }
    .shadow { filter: drop-shadow(0px 18px 32px rgba(15, 23, 42, 0.13)); }
  </style>

<rect class="bg" width="1440" height="820"/>
<defs>
  <linearGradient id="g1" x1="100" y1="80" x2="1340" y2="720" gradientUnits="userSpaceOnUse">
    <stop stop-color="#EEF7FF"/>
    <stop offset="0.48" stop-color="#F7FAFC"/>
    <stop offset="1" stop-color="#F1F5F9"/>
  </linearGradient>
  <linearGradient id="accent" x1="174" y1="325" x2="1266" y2="325" gradientUnits="userSpaceOnUse">
    <stop stop-color="#0EA5E9"/>
    <stop offset="0.5" stop-color="#6366F1"/>
    <stop offset="1" stop-color="#14B8A6"/>
  </linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#64748B"/></marker>
</defs>
<rect x="72" y="62" width="1296" height="696" rx="46" fill="url(#g1)" stroke="#D9E4EF"/>
<text x="110" y="138" class="title" fill="#0F172A">Governance before the agent builds</text>
<text x="112" y="185" class="subtitle" fill="#475569">Axiom turns human intent, access boundaries, approvals, and audit obligations into rules an agent can inspect and a project can verify.</text>

<path d="M238 330H432" stroke="#64748B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M548 330H742" stroke="#64748B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M858 330H1052" stroke="#64748B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M720 465C720 550 815 600 930 600" stroke="#64748B" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 12" marker-end="url(#arrow)"/>

<g class="shadow">
<rect x="118" y="255" width="230" height="150" rx="28" fill="#FFFFFF" stroke="#D8E1EA"/>
<circle cx="168" cy="307" r="26" fill="#E0F2FE"/>
<path d="M158 309C158 296 178 296 178 309V326H158V309Z" fill="#0284C7" opacity=".9"/>
<circle cx="168" cy="292" r="11" fill="#0284C7" opacity=".9"/>
<text x="205" y="305" class="label" fill="#0F172A">Human</text>
<text x="205" y="334" class="small" fill="#475569">intent</text>
<text x="145" y="378" class="tiny" fill="#64748B">What should be built?</text>
</g>

<g class="shadow">
<rect x="428" y="255" width="230" height="150" rx="28" fill="#FFFFFF" stroke="#D8E1EA"/>
<circle cx="478" cy="307" r="26" fill="#EEF2FF"/>
<path d="M466 294H490V321H466V294Z" fill="#4F46E5" opacity=".9"/>
<path d="M471 301H485M471 308H485M471 315H480" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
<text x="515" y="305" class="label" fill="#0F172A">Axiom</text>
<text x="515" y="334" class="small" fill="#475569">contract</text>
<text x="458" y="378" class="tiny" fill="#64748B">Rules, limits, approvals</text>
</g>

<g class="shadow">
<rect x="738" y="255" width="230" height="150" rx="28" fill="#FFFFFF" stroke="#D8E1EA"/>
<circle cx="788" cy="307" r="26" fill="#ECFEFF"/>
<path d="M775 300H801V318H775V300Z" fill="#0891B2" opacity=".9"/>
<circle cx="782" cy="309" r="3" fill="#FFFFFF"/><circle cx="794" cy="309" r="3" fill="#FFFFFF"/>
<path d="M788 290V300" stroke="#0891B2" stroke-width="4" stroke-linecap="round"/>
<text x="825" y="305" class="label" fill="#0F172A">AI coding</text>
<text x="825" y="334" class="small" fill="#475569">agent</text>
<text x="768" y="378" class="tiny" fill="#64748B">Builds within boundaries</text>
</g>

<g class="shadow">
<rect x="1048" y="255" width="230" height="150" rx="28" fill="#FFFFFF" stroke="#D8E1EA"/>
<circle cx="1098" cy="307" r="26" fill="#F0FDFA"/>
<path d="M1084 307L1094 317L1114 293" stroke="#0F766E" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<text x="1135" y="305" class="label" fill="#0F172A">Checks</text>
<text x="1135" y="334" class="small" fill="#475569">+ artifacts</text>
<text x="1070" y="378" class="tiny" fill="#64748B">Validate, simulate, generate</text>
</g>

<g class="shadow">
<rect x="914" y="535" width="300" height="130" rx="28" fill="#FFFFFF" stroke="#D8E1EA"/>
<circle cx="964" cy="587" r="26" fill="#FFF7ED"/>
<path d="M951 576H977V599H951V576Z" fill="#EA580C" opacity=".9"/>
<path d="M956 584H972M956 592H966" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
<text x="1002" y="588" class="label" fill="#0F172A">Evidence</text>
<text x="1002" y="617" class="small" fill="#475569">audit obligations</text>
</g>

<rect x="112" y="696" width="1216" height="2" fill="url(#accent)" opacity=".55"/>
</svg>
