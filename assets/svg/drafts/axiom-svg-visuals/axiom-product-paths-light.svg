<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" fill="none" role="img" aria-labelledby="title desc">
<title id="title">Axiom product paths</title>
<desc id="desc">A diagram showing AxiomOS as the open-source foundation with future Enterprise and Government paths built on top.</desc>

  <style>
    .bg { fill: transparent; }
    .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 54px; font-weight: 760; letter-spacing: -1.2px; }
    .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 24px; font-weight: 450; line-height: 1.4; }
    .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 25px; font-weight: 700; }
    .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 500; }
    .tiny { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; font-weight: 500; }
    .mono { font-family: 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size: 17px; font-weight: 600; }
    .card { rx: 28; }
    .shadow { filter: drop-shadow(0px 18px 32px rgba(15, 23, 42, 0.13)); }
  </style>

<rect width="1440" height="820" fill="transparent"/>
<defs><linearGradient id="base" x1="220" y1="565" x2="1220" y2="565" gradientUnits="userSpaceOnUse"><stop stop-color="#0EA5E9"/><stop offset=".5" stop-color="#6366F1"/><stop offset="1" stop-color="#14B8A6"/></linearGradient></defs>
<text x="100" y="108" class="title" fill="#0F172A">One foundation. Different paths.</text>
<text x="102" y="154" class="subtitle" fill="#475569">Use this near the AxiomOS / Enterprise / Government section.</text>
<rect x="190" y="515" width="1060" height="120" rx="34" fill="url(#base)" opacity=".95"/>
<text x="548" y="575" class="label" fill="#FFFFFF">AxiomOS</text>
<text x="457" y="606" class="small" fill="#E0F2FE">open-source foundation available now</text>
<rect x="155" y="250" width="330" height="190" rx="34" fill="#FFFFFF" stroke="#D8E1EA"/>
<rect x="555" y="250" width="330" height="190" rx="34" fill="#FFFFFF" stroke="#D8E1EA"/>
<rect x="955" y="250" width="330" height="190" rx="34" fill="#FFFFFF" stroke="#D8E1EA"/>
<circle cx="220" cy="315" r="32" fill="#E0F2FE"/><text x="270" y="310" class="label" fill="#0F172A">Builders</text><text x="270" y="340" class="small" fill="#475569">and open source</text><text x="188" y="395" class="tiny" fill="#64748B">Local CLI, contracts, simulations, artifacts</text>
<circle cx="620" cy="315" r="32" fill="#EEF2FF"/><text x="670" y="310" class="label" fill="#0F172A">Enterprise</text><text x="670" y="340" class="small" fill="#475569">future path</text><text x="588" y="395" class="tiny" fill="#64748B">Team governance, approvals, reports</text>
<circle cx="1020" cy="315" r="32" fill="#F0FDFA"/><text x="1070" y="310" class="label" fill="#0F172A">Government</text><text x="1070" y="340" class="small" fill="#475569">future path</text><text x="988" y="395" class="tiny" fill="#64748B">Audit, evidence, deployment verification</text>
<path d="M320 440V515" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
<path d="M720 440V515" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
<path d="M1120 440V515" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
<text x="384" y="700" class="small" fill="#475569">AxiomOS stays useful on its own while future managed editions add operational depth.</text>
</svg>
