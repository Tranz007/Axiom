<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" fill="none" role="img" aria-labelledby="title desc">
<title id="title">Without Axiom versus with Axiom</title>
<desc id="desc">Side-by-side diagram comparing scattered prompt guidance without Axiom against checked project contracts with Axiom.</desc>

  <style>
    .bg { fill: transparent; }
    .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 54px; font-weight: 760; letter-spacing: -1.2px; }
    .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 24px; font-weight: 450; line-height: 1.4; }
    .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 25px; font-weight: 700; }
    .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 500; }
    .tiny { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; font-weight: 500; }
    .mono { font-family: 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size: 17px; font-weight: 600; }
    .card { rx: 28; }
    .shadow { filter: drop-shadow(0px 18px 32px rgba(15, 23, 42, 0.13)); }
  </style>

<rect width="1440" height="820" fill="transparent"/>
<text x="100" y="105" class="title" fill="#0F172A">Prompts guide agents. Axiom governs boundaries.</text>
<text x="102" y="151" class="subtitle" fill="#475569">A simple before-and-after visual for the homepage problem section.</text>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#64748B"/></marker></defs>
<rect x="96" y="210" width="588" height="500" rx="36" fill="#FFF7ED" stroke="#FED7AA"/>
<rect x="756" y="210" width="588" height="500" rx="36" fill="#F0FDFA" stroke="#99F6E4"/>
<text x="142" y="275" class="label" fill="#9A3412">Without Axiom</text>
<text x="802" y="275" class="label" fill="#0F766E">With Axiom</text>
<g class="small" fill="#7C2D12">
  <text x="142" y="336">Rules live in prompts</text>
  <text x="142" y="386">Guidance sits in README files</text>
  <text x="142" y="436">Approvals are implied</text>
  <text x="142" y="486">Sensitive data rules are scattered</text>
  <text x="142" y="536">Audit depends on implementation</text>
  <text x="142" y="586">Agent may infer too much</text>
</g>
<g stroke="#FDBA74" stroke-width="3" stroke-linecap="round">
  <path d="M560 330C595 355 603 393 575 427"/>
  <path d="M520 455C560 470 600 510 580 560"/>
  <path d="M300 610C390 635 500 620 580 580"/>
</g>
<g class="small" fill="#134E4A">
  <text x="802" y="336">Rules live with the project</text>
  <text x="802" y="386">Agents inspect boundaries first</text>
  <text x="802" y="436">Approvals are explicit</text>
  <text x="802" y="486">Sensitive data is declared</text>
  <text x="802" y="536">Artifacts can be verified</text>
  <text x="802" y="586">Evidence is planned up front</text>
</g>
<g stroke="#14B8A6" stroke-width="4" stroke-linecap="round">
  <path d="M1195 334H1246" marker-end="url(#arrow)"/>
  <path d="M1195 384H1246" marker-end="url(#arrow)"/>
  <path d="M1195 434H1246" marker-end="url(#arrow)"/>
  <path d="M1195 484H1246" marker-end="url(#arrow)"/>
  <path d="M1195 534H1246" marker-end="url(#arrow)"/>
  <path d="M1195 584H1246" marker-end="url(#arrow)"/>
</g>
<rect x="1254" y="306" width="44" height="306" rx="22" fill="#CCFBF1" stroke="#5EEAD4"/>
<text x="1237" y="668" class="tiny" fill="#0F766E">checked boundaries</text>
<path d="M702 460H736" stroke="#64748B" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
