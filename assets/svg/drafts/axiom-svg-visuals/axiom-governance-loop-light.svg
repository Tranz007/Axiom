<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" role="img" aria-labelledby="title desc">
<title id="title">Axiom governance loop</title>
<desc id="desc">Circular governance loop showing define, simulate, generate, verify, and audit around Axiom.</desc>

  <style>
    .bg { fill: transparent; }
    .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 54px; font-weight: 760; letter-spacing: -1.2px; }
    .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 24px; font-weight: 450; line-height: 1.4; }
    .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 25px; font-weight: 700; }
    .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 500; }
    .tiny { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; font-weight: 500; }
    .mono { font-family: 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size: 17px; font-weight: 600; }
    .card { rx: 28; }
    .shadow { filter: drop-shadow(0px 18px 32px rgba(15, 23, 42, 0.13)); }
  </style>

<rect width="1080" height="1080" fill="transparent"/>
<defs>
<linearGradient id="ring" x1="180" y1="180" x2="900" y2="900" gradientUnits="userSpaceOnUse"><stop stop-color="#0EA5E9"/><stop offset=".5" stop-color="#6366F1"/><stop offset="1" stop-color="#14B8A6"/></linearGradient>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#64748B"/></marker>
</defs>
<circle cx="540" cy="540" r="245" stroke="url(#ring)" stroke-width="26" stroke-linecap="round" stroke-dasharray="1120 180" transform="rotate(-90 540 540)"/>
<circle cx="540" cy="540" r="150" fill="#F8FAFC" stroke="#D8E1EA" stroke-width="2"/>
<text x="454" y="532" class="title" font-size="46" fill="#0F172A">Axiom</text>
<text x="408" y="578" class="subtitle" font-size="23" fill="#475569">contract layer</text>
<g>
<rect x="414" y="118" width="252" height="92" rx="28" fill="#FFFFFF" stroke="#D8E1EA"/><text x="480" y="172" class="label" fill="#0F172A">Define</text>
<rect x="724" y="292" width="252" height="92" rx="28" fill="#FFFFFF" stroke="#D8E1EA"/><text x="782" y="346" class="label" fill="#0F172A">Simulate</text>
<rect x="724" y="696" width="252" height="92" rx="28" fill="#FFFFFF" stroke="#D8E1EA"/><text x="782" y="750" class="label" fill="#0F172A">Generate</text>
<rect x="414" y="870" width="252" height="92" rx="28" fill="#FFFFFF" stroke="#D8E1EA"/><text x="485" y="924" class="label" fill="#0F172A">Verify</text>
<rect x="104" y="696" width="252" height="92" rx="28" fill="#FFFFFF" stroke="#D8E1EA"/><text x="178" y="750" class="label" fill="#0F172A">Audit</text>
<rect x="104" y="292" width="252" height="92" rx="28" fill="#FFFFFF" stroke="#D8E1EA"/><text x="172" y="346" class="label" fill="#0F172A">Bound</text>
</g>
</svg>
