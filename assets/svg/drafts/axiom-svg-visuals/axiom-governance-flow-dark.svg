<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" fill="none" role="img" aria-labelledby="title desc">
<title id="title">Axiom governance flow dark</title>
<desc id="desc">Dark version of workflow diagram showing Axiom governance before AI agent builds.</desc>

  <style>
    .bg { fill: transparent; }
    .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 54px; font-weight: 760; letter-spacing: -1.2px; }
    .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 24px; font-weight: 450; line-height: 1.4; }
    .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 25px; font-weight: 700; }
    .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 500; }
    .tiny { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; font-weight: 500; }
    .mono { font-family: 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace; font-size: 17px; font-weight: 600; }
    .card { rx: 28; }
    .shadow { filter: drop-shadow(0px 18px 32px rgba(15, 23, 42, 0.13)); }
  </style>

<rect class="bg" width="1440" height="820"/>
<defs>
  <linearGradient id="g1" x1="100" y1="80" x2="1340" y2="720" gradientUnits="userSpaceOnUse"><stop stop-color="#071827"/><stop offset="0.55" stop-color="#0F172A"/><stop offset="1" stop-color="#082F2E"/></linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#94A3B8"/></marker>
</defs>
<rect x="72" y="62" width="1296" height="696" rx="46" fill="url(#g1)" stroke="#203349"/>
<text x="110" y="138" class="title" fill="#F8FAFC">Governance before the agent builds</text>
<text x="112" y="185" class="subtitle" fill="#CBD5E1">Axiom turns human intent, access boundaries, approvals, and audit obligations into rules an agent can inspect and a project can verify.</text>
<path d="M238 330H432M548 330H742M858 330H1052" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M720 465C720 550 815 600 930 600" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 12" marker-end="url(#arrow)"/>
<g><rect x="118" y="255" width="230" height="150" rx="28" fill="#111C2E" stroke="#27415F"/><circle cx="168" cy="307" r="26" fill="#073A5D"/><path d="M158 309C158 296 178 296 178 309V326H158V309Z" fill="#38BDF8"/><circle cx="168" cy="292" r="11" fill="#38BDF8"/><text x="205" y="305" class="label" fill="#F8FAFC">Human</text><text x="205" y="334" class="small" fill="#CBD5E1">intent</text><text x="145" y="378" class="tiny" fill="#94A3B8">What should be built?</text></g>
<g><rect x="428" y="255" width="230" height="150" rx="28" fill="#111C2E" stroke="#27415F"/><circle cx="478" cy="307" r="26" fill="#1E1B4B"/><path d="M466 294H490V321H466V294Z" fill="#818CF8"/><path d="M471 301H485M471 308H485M471 315H480" stroke="#0F172A" stroke-width="3" stroke-linecap="round"/><text x="515" y="305" class="label" fill="#F8FAFC">Axiom</text><text x="515" y="334" class="small" fill="#CBD5E1">contract</text><text x="458" y="378" class="tiny" fill="#94A3B8">Rules, limits, approvals</text></g>
<g><rect x="738" y="255" width="230" height="150" rx="28" fill="#111C2E" stroke="#27415F"/><circle cx="788" cy="307" r="26" fill="#164E63"/><path d="M775 300H801V318H775V300Z" fill="#22D3EE"/><circle cx="782" cy="309" r="3" fill="#0F172A"/><circle cx="794" cy="309" r="3" fill="#0F172A"/><path d="M788 290V300" stroke="#22D3EE" stroke-width="4" stroke-linecap="round"/><text x="825" y="305" class="label" fill="#F8FAFC">AI coding</text><text x="825" y="334" class="small" fill="#CBD5E1">agent</text><text x="768" y="378" class="tiny" fill="#94A3B8">Builds within boundaries</text></g>
<g><rect x="1048" y="255" width="230" height="150" rx="28" fill="#111C2E" stroke="#27415F"/><circle cx="1098" cy="307" r="26" fill="#134E4A"/><path d="M1084 307L1094 317L1114 293" stroke="#2DD4BF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="1135" y="305" class="label" fill="#F8FAFC">Checks</text><text x="1135" y="334" class="small" fill="#CBD5E1">+ artifacts</text><text x="1070" y="378" class="tiny" fill="#94A3B8">Validate, simulate, generate</text></g>
<g><rect x="914" y="535" width="300" height="130" rx="28" fill="#111C2E" stroke="#27415F"/><circle cx="964" cy="587" r="26" fill="#431407"/><path d="M951 576H977V599H951V576Z" fill="#FB923C"/><path d="M956 584H972M956 592H966" stroke="#0F172A" stroke-width="3" stroke-linecap="round"/><text x="1002" y="588" class="label" fill="#F8FAFC">Evidence</text><text x="1002" y="617" class="small" fill="#CBD5E1">audit obligations</text></g>
<rect x="112" y="696" width="1216" height="2" fill="#38BDF8" opacity=".55"/>
</svg>
