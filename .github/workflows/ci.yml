name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node ./bin/axiom.mjs validate examples/agent-capability-gateway/axiom.ax
      - run: node ./bin/axiom.mjs validate examples/receipt-archive/axiom.ax
      - run: node --test
